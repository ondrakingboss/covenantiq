services:
  - type: web
    name: covenantiq-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: COVENANTIQ_DB_PATH
        value: /var/data/covenantiq.db
    disk:
      name: covenantiq-data
      mountPath: /var/data
      sizeGB: 1
